name: Supabase Keep Alive

# 무료 플랜 7일 비활성 자동 일시중지 방지용 주기 핑
on:
  schedule:
    # 3일에 한 번 (UTC 00:00). 7일 한계보다 여유 있게.
    - cron: '0 0 */3 * *'
  # 수동 실행도 가능 (Actions 탭 > Run workflow)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: keep-alive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run keep-alive ping
        run: node ping.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
